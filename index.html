    <script>
        // MANEJO DE VISTAS LOGIN Y REGISTRO (Intacto)
        function rellenarFechas(diaId, anioId) {
            const diaSel = document.getElementById(diaId); const anioSel = document.getElementById(anioId);
            if(diaSel && anioSel) {
                for(let i=1; i<=31; i++) { let opt = document.createElement('option'); opt.value = i<10?'0'+i:i; opt.textContent = i; diaSel.appendChild(opt); }
                const anioActual = new Date().getFullYear();
                for(let i=anioActual-18; i>=1940; i--) { let opt = document.createElement('option'); opt.value = i; opt.textContent = i; anioSel.appendChild(opt); }
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            rellenarFechas('prop-dia', 'prop-anio'); rellenarFechas('gestor-dia', 'gestor-anio');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active'); document.getElementById(tab.dataset.target).classList.add('active');
                });
            });
            const formsSlider = document.getElementById('forms-slider');
            window.goToLogin = function() { if(formsSlider) formsSlider.style.transform = 'translateX(0)'; }
            window.goToRegistro = function() { if(formsSlider) formsSlider.style.transform = 'translateX(-50%)'; }
            document.getElementById('btn-ir-registro')?.addEventListener('click', (e) => { e.preventDefault(); goToRegistro(); });
            document.getElementById('btn-ir-login')?.addEventListener('click', (e) => { e.preventDefault(); goToLogin(); });
            document.getElementById('btn-menu-login')?.addEventListener('click', (e) => { e.preventDefault(); goToLogin(); document.getElementById('login').scrollIntoView({behavior: 'smooth'}); });
            document.getElementById('btn-menu-registro')?.addEventListener('click', (e) => { e.preventDefault(); goToRegistro(); document.getElementById('login').scrollIntoView({behavior: 'smooth'}); });
        });
    </script>

                'Valparaíso': ['Cerro Alegre', 'Cerro Concepción', 'Playa Ancha', 'Centro', 'Placilla', 'Curauma', 'Barón'],
                'Viña del Mar': ['Reñaca', 'Gómez Carreño', 'Miraflores', 'Centro', 'Chorrillos', 'Forestal', 'Santa Inés', 'Agua Santa', 'Concón Sur'],
                'Santiago': ['Centro', 'Lastarria', 'Bellas Artes', 'Barrio Brasil', 'Yungay', 'Matta', 'Franklin'],
                'Providencia': ['Bellavista', 'Pedro de Valdivia', 'Los Leones', 'Tobalaba', 'Inés de Suárez', 'Bilbao'],
                'Las Condes': ['El Golf', 'Apoquindo', 'San Carlos de Apoquindo', 'Escuela Militar', 'Los Dominicos', 'Cantagallo'],
                'Concepción': ['Centro', 'Barrio Universitario', 'Collao', 'Pedro de Valdivia', 'Lomas de San Andrés', 'Lorenzo Arenas'],
                'Temuco': ['Centro', 'Portal de la Frontera', 'Avenida Alemania', 'Barrio Inglés', 'Fundo El Carmen', 'Labranza'],
                'Puerto Montt': ['Valle Volcanes', 'Centro', 'Pelluco', 'Mirasol', 'Cardonal', 'Chinquihue']
            };

            const filtroRegion = document.getElementById('filtro-region');
            const filtroComuna = document.getElementById('filtro-comuna');
            const filtroSector = document.getElementById('filtro-sector');
            const dataListBusqueda = document.getElementById('lista-sectores-busqueda');

            // 1. Llenar Regiones
            for (let region in chileData) {
                let option = document.createElement("option");
                option.value = region;
                option.text = region;
                filtroRegion.add(option);
            }

            // 2. Cascada Región -> Comuna
            filtroRegion.addEventListener('change', function() {
                filtroComuna.innerHTML = '<option value="todas">Comuna (Todas)</option>';
                if (this.value !== "todas") {
                    filtroComuna.disabled = false;
                    chileData[this.value].forEach(comuna => {
                        let option = document.createElement("option");
                        option.value = comuna;
                        option.text = comuna;
                        filtroComuna.add(option);
                    });
                } else {
                    filtroComuna.disabled = true;
                    filtroSector.disabled = true;
                    filtroSector.value = '';
                }
                filtroComuna.dispatchEvent(new Event('change'));
            });

            // 3. Cascada Comuna -> Sector Predictivo
            filtroComuna.addEventListener('change', function() {
                const comuna = this.value;
                dataListBusqueda.innerHTML = '';
                filtroSector.value = '';

                if (comuna !== "todas" && comuna !== "") {
                    filtroSector.disabled = false;
                    filtroSector.placeholder = `Escribe o elige sector en ${comuna}...`;
                    if (sectoresEspecificos[comuna]) {
                        sectoresEspecificos[comuna].forEach(s => {
                            let option = document.createElement('option');
                            option.value = s;
                            dataListBusqueda.appendChild(option);
                        });
                    }
                } else {
                    filtroSector.disabled = true;
                    filtroSector.placeholder = 'Sector (Opcional)';
                }
            });

            let propiedadesActuales = [];
            
            // CARGA INICIAL
            cargarPropiedadesPublicas();

            // EVENTO DE BÚSQUEDA
            document.getElementById('btn-buscar-prop')?.addEventListener('click', cargarPropiedadesPublicas);

            // MOTOR DE FILTRADO CRUZADO
            function cargarPropiedadesPublicas() {
                const tipo = document.getElementById('filtro-tipo').value;
                const region = document.getElementById('filtro-region').value;
                const comuna = document.getElementById('filtro-comuna').value;
                const sector = document.getElementById('filtro-sector').value.trim().toLowerCase();

                fetch(`backend/api_dashboard.php?action=get_propiedades`)
                .then(res => res.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        document.getElementById('contenedor-propiedades').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#64748b; padding:40px; font-weight:700; font-size:18px;">No hay propiedades publicadas aún.</p>';
                    } else {
                        propiedadesActuales = data.filter(p => {
                            let matchTipo = (tipo === 'todas' || p.tipo.toLowerCase() === tipo);
                            let matchRegion = (region === 'todas' || (p.region && p.region.toLowerCase() === region.toLowerCase()));
                            let matchComuna = (comuna === 'todas' || p.comuna.toLowerCase() === comuna.toLowerCase());
                            let matchSector = (sector === '' || (p.sector && p.sector.toLowerCase().includes(sector)));
                            
                            return matchTipo && matchRegion && matchComuna && matchSector;
                        });
                        renderizarTarjetas(propiedadesActuales);
                    }
                })
                .catch(err => {
                    document.getElementById('contenedor-propiedades').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#ef4444; padding:40px; font-weight:700;">Error conectando a la base de datos.</p>';
                });
            }

            function renderizarTarjetas(propiedades) {
                const contenedor = document.getElementById('contenedor-propiedades');
                if (!contenedor) return;
                contenedor.innerHTML = '';
                
                if(propiedades.length === 0) {
                    contenedor.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#64748b; padding:40px; font-weight:700; font-size:18px;">No encontramos propiedades con esos filtros exactos.</p>`;
                    return;
                }

                propiedades.forEach(p => {
                    let rutaFoto = p.imagen_principal;
                    if (!rutaFoto || rutaFoto === 'default.jpg') { rutaFoto = 'img/default.jpg'; } 
                    else if (!rutaFoto.startsWith('http')) { rutaFoto = 'uploads/' + rutaFoto; }

                    // Extras integrados a la tarjeta
                    let extrasBadge = '';
                    if(p.piscina == 1) extrasBadge += `<span style="background:#0dcaf0; color:#000; padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold; margin-right:5px;">🏊 Piscina</span>`;
                    if(p.estacionamiento == 1) extrasBadge += `<span style="background:#6c757d; color:#fff; padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold;">🚗 Estac.</span>`;

                    contenedor.innerHTML += `
                        <article class="tarjeta-inmueble">
                            <div class="tarjeta-img-container">
                                <span class="badge-codigo">${p.codigo}</span>
                                <img src="${rutaFoto}" alt="${p.tipo}" class="tarjeta-img" onerror="this.src='https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'">
                            </div>
                            <div class="tarjeta-info-interior">
                                <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:8px;">
                                    <h3 style="text-transform: capitalize; margin:0;">${p.tipo} en Venta</h3>
                                </div>
                                <div style="margin-bottom: 10px;">${extrasBadge}</div>
                                
                                <p class="tarjeta-ubicacion">
                                    📍 ${p.ubicacion}<br>
                                    <span style="font-size:13px; color:#94a3b8; display:block; margin-top:5px;">🏢 ${p.comuna} | ${p.region || 'Región no especificada'} <br>Sector: ${p.sector || 'N/A'}</span>
                                </p>
                                <p class="tarjeta-precio">$ ${parseInt(p.precio).toLocaleString('es-CL')}</p>
                                
                                <div class="tarjeta-stats">
                                    <span class="stat-item" title="Superficie Total">📐 ${p.superficie || 0} m²</span>
                                    <span class="stat-item" title="Habitaciones">🛏️ ${p.dormitorios || 0}</span>
                                    <span class="stat-item" title="Baños">🚿 ${p.banos || 0}</span>
                                </div>
                                
                                <div class="tarjeta-footer-btn">
                                    <button class="btn-detalles-premium" onclick="verDetalleInmueble('${p.id}')">Ver Detalles</button>
                                </div>
                            </div>
                        </article>
                    `;
                });
            }

            // MODAL Y CARRUSEL DE BOOTSTRAP (Intacto y Ajustado)
            window.verDetalleInmueble = function(id) {
                const p = propiedadesActuales.find(prop => prop.id == id);
                if (!p) return;

                const modalBody = document.getElementById('modal-body');
                const modal = document.getElementById('modal-detalle');
                
                let rutaFoto = p.imagen_principal;
                if (!rutaFoto || rutaFoto === 'default.jpg') { rutaFoto = 'img/default.jpg'; } 
                else if (!rutaFoto.startsWith('http')) { rutaFoto = 'uploads/' + rutaFoto; }

                let galeria = [];
                try { galeria = JSON.parse(p.galeria_fotos || '[]'); } catch(e){}
                
                let todasLasFotos = [rutaFoto];
                galeria.forEach(f => {
                    if(f !== p.imagen_principal) todasLasFotos.push('uploads/' + f);
                });

                let carouselIndicators = '';
                let carouselItems = '';

                todasLasFotos.forEach((foto, index) => {
                    let act = index === 0 ? 'active' : '';
                    carouselIndicators += `<button type="button" data-bs-target="#carruselPropiedad" data-bs-slide-to="${index}" class="${act}"></button>`;
                    
                    carouselItems += `
                        <div class="carousel-item ${act}" style="height: 380px;">
                            <img src="${foto}" class="d-block w-100" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'">
                        </div>
                    `;
                });

                let carruselHTML = `
                    <div id="carruselPropiedad" class="carousel slide" data-bs-ride="carousel" style="width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background-color: #f8fafc;">
                        <div class="carousel-indicators">${carouselIndicators}</div>
                        <div class="carousel-inner" style="width: 100%;">${carouselItems}</div>
                        ${todasLasFotos.length > 1 ? `
                        <button class="carousel-control-prev" type="button" data-bs-target="#carruselPropiedad" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true" style="background-color: #FF0066; border-radius: 50%; padding: 15px;"></span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carruselPropiedad" data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true" style="background-color: #FF0066; border-radius: 50%; padding: 15px;"></span>
                        </button>
                        ` : ''}
                    </div>
                `;

                let extrasHTML = '';
                if(p.piscina == 1) extrasHTML += '<span style="background:#0dcaf0; color:#000; padding:6px 12px; border-radius:6px; font-size:13px; font-weight:bold; margin-right:10px;">🏊 Piscina Disponible</span>';
                if(p.estacionamiento == 1) extrasHTML += '<span style="background:#6c757d; color:#fff; padding:6px 12px; border-radius:6px; font-size:13px; font-weight:bold;">🚗 Estacionamiento</span>';

                modalBody.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
                        
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                            <h2 style="text-transform: uppercase; font-weight: 900; color: #0f172a; font-size:24px; margin:0;">${p.tipo} en Venta</h2>
                            <span style="font-size: 28px; font-weight: 900; color: #FF0066;">$ ${parseInt(p.precio).toLocaleString('es-CL')}</span>
                        </div>
                        <span style="color: #94a3b8; font-size: 13px; font-weight:700; margin-top:-10px;">CÓDIGO: ${p.codigo}</span>
                        
                        ${carruselHTML}

                        <div style="margin-top:5px; margin-bottom:5px;">${extrasHTML}</div>

                        <div style="background:#f8fafc; padding: 15px; border-radius: 8px; border-left: 4px solid #FF0066;">
                            <p style="color: #475569; font-size: 15px; line-height: 1.6; margin:0;">${p.descripcion || 'Ficha técnica no cuenta con descripción adicional.'}</p>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); text-align:center; background: #0f172a; color:white; padding: 15px; border-radius: 10px; font-weight: bold; font-size:16px; gap:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                            <div><span style="display:block; font-size:11px; color:#94a3b8; text-transform:uppercase; margin-bottom:5px;">Área Total</span>📐 ${p.superficie || 0} m²</div>
                            <div><span style="display:block; font-size:11px; color:#94a3b8; text-transform:uppercase; margin-bottom:5px;">Habitaciones</span>🛏️ ${p.dormitorios || 0}</div>
                            <div><span style="display:block; font-size:11px; color:#94a3b8; text-transform:uppercase; margin-bottom:5px;">Baños</span>🚿 ${p.banos || 0}</div>
                        </div>
                        
                        <div style="background:#f1f5f9; padding: 12px; border-radius: 8px; font-size: 15px; color: #334155; font-weight: 600;">
                            📍 <strong>Ubicación:</strong> ${p.ubicacion} <br> 🏢 <strong>Geografía:</strong> ${p.comuna}, ${p.region || 'Región no definida'} &nbsp;|&nbsp; <strong>Sector:</strong> ${p.sector || 'N/A'}
                        </div>
                        
                        <button class="btn-detalles-premium" style="margin-top: 10px; padding: 18px; font-size: 16px;" onclick="triggerCotizarRedirect()">Cotizar Ahora</button>
                    </div>
                `;
                
                modal.style.display = 'flex';
                modal.setAttribute('aria-hidden', 'false');
            };

            window.triggerCotizarRedirect = function() {
                document.getElementById('modal-detalle').style.display = 'none';
                Swal.fire({
                    title: 'Acción Requerida',
                    text: 'Debes iniciar sesión para continuar con tu cotización.',
                    icon: 'info',
                    confirmButtonText: 'Iniciar Sesión',
                    confirmButtonColor: '#FF0066'
                }).then(() => {
                    goToLogin();
                    document.getElementById('login').scrollIntoView({ behavior: 'smooth' });
                });
            };

            document.getElementById('modal-cerrar')?.addEventListener('click', () => { document.getElementById('modal-detalle').style.display = 'none'; });

            // LOGICA REGISTRO (Intacto)
            const formRegistroProp = document.getElementById('registro-propietario');
            if (formRegistroProp) {
                formRegistroProp.addEventListener('submit', function(e) {
                    e.preventDefault();
                    fetch('backend/auth.php?action=registro', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rut: document.getElementById('prop-rut').value.trim(), nombre: document.getElementById('prop-nombre').value.trim(), correo: document.getElementById('prop-email').value.trim(), clave: document.getElementById('prop-password').value.trim(), rol: 'propietario' })
                    }).then(res => res.json()).then(data => {
                        if (data.success) { Swal.fire('¡Registro Exitoso!', data.message, 'success').then(() => { formRegistroProp.reset(); goToLogin(); }); } 
                        else { Swal.fire('Error', data.message, 'error'); }
                    });
                });
            }

            const formRegistroGestor = document.getElementById('registro-gestor');
            if (formRegistroGestor) {
                formRegistroGestor.addEventListener('submit', function(e) {
                    e.preventDefault();
                    fetch('backend/auth.php?action=registro', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rut: document.getElementById('gestor-rut').value.trim(), nombre: document.getElementById('gestor-nombre').value.trim(), correo: document.getElementById('gestor-email').value.trim(), clave: document.getElementById('gestor-password').value.trim(), rol: 'gestor' })
                    }).then(res => res.json()).then(data => {
                        if (data.success) { Swal.fire('¡Registro Exitoso!', data.message, 'success').then(() => { formRegistroGestor.reset(); goToLogin(); }); } 
                        else { Swal.fire('Error', data.message, 'error'); }
                    });
                });
            }
        });
    </script>
</body>
</html>
